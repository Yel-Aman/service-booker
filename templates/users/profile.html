{% extends 'base.html' %}

{% block title %}Профиль — ServiceBooker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5" data-aos="fade-up">
        <div class="text-center mb-4">
            <div style="width:80px; height:80px; background:linear-gradient(135deg,#6c47ff,#a855f7); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:2rem;">
                👤
            </div>
            <h3 style="font-weight:800; letter-spacing:-1px; color:white;">{{ user.username }}</h3>
            <p style="color:rgba(255,255,255,0.4);">{{ user.get_role_display }}</p>
        </div>
        <div class="card" style="border-radius:24px;">
            <div class="card-body p-5">
                {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-success" style="border-radius:12px; background:rgba(99,255,180,0.1); border:1px solid rgba(99,255,180,0.3); color:#63ffb4;">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label">Телефон</label>
                        <input type="text" name="phone" class="form-control" value="{{ user.phone }}" placeholder="+7 777 123 4567">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}" placeholder="email@example.com">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3" style="border-radius:12px; font-size:1rem;">
                        💾 Сохранить изменения
                    </button>
                </form>
            </div>
        </div>
        <a href="{% url 'my_bookings' %}" class="btn btn-outline-secondary w-100 mt-3" style="border-radius:12px;">📋 Мои записи</a>
    </div>
</div>
{% endblock %}
