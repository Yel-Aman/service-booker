{% extends 'base.html' %}

{% block title %}Восстановление пароля — ServiceBooker{% endblock %}

{% block content %}
<div class="row min-vh-75 align-items-center justify-content-center">
    <div class="col-md-5" data-aos="fade-up">
        <div class="text-center mb-4">
            <div style="font-size:3rem; animation:float 3s ease-in-out infinite;">🔑</div>
            <h3 style="font-weight:800; letter-spacing:-1px; margin-top:8px; color:white;">Забыли пароль?</h3>
            <p style="color:rgba(255,255,255,0.4);">Введите email — отправим ссылку для сброса</p>
        </div>
        <div class="card" style="border-radius:24px;">
            <div class="card-body p-5">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3" style="border-radius:12px; font-size:1rem;">
                        Отправить ссылку →
                    </button>
                </form>
                <p class="text-center mt-4 mb-0" style="color:rgba(255,255,255,0.4); font-size:0.9rem;">
                    Вспомнили? <a href="{% url 'login' %}" style="color:#a855f7; font-weight:600;">Войти</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
